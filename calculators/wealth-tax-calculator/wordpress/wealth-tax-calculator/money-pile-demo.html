<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Money Pile Growth Demo</title>
    <style>
      :root {
        --bg-top: #0f2b21;
        --bg-mid: #1f4d3a;
        --bg-bottom: #537a57;
        --card-bg: rgba(8, 24, 17, 0.74);
        --card-border: rgba(220, 255, 230, 0.18);
        --text-main: #f4fff0;
        --text-muted: #bee4c7;
        --mint: #7dffa4;
        --mint-dark: #177446;
        --gold: #f6cb57;
        --gold-dark: #8f681f;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        font-family: "Avenir Next", "Segoe UI", sans-serif;
        color: var(--text-main);
        background:
          radial-gradient(1100px 420px at 90% -5%, rgba(173, 255, 208, 0.24), transparent 60%),
          radial-gradient(900px 380px at -10% 12%, rgba(76, 255, 167, 0.22), transparent 55%),
          linear-gradient(180deg, var(--bg-top), var(--bg-mid) 45%, var(--bg-bottom));
        overflow-x: hidden;
      }

      .page {
        width: min(1040px, 95vw);
        margin: 0 auto;
        padding: 26px 0 40px;
      }

      .header {
        margin-bottom: 18px;
      }

      h1 {
        font-size: clamp(1.7rem, 4vw, 2.8rem);
        margin: 0 0 6px;
        letter-spacing: 0.03em;
      }

      .subtitle {
        margin: 0;
        color: var(--text-muted);
        font-size: clamp(0.95rem, 1.6vw, 1.05rem);
      }

      .layout {
        display: grid;
        grid-template-columns: 1fr minmax(250px, 300px);
        gap: 18px;
      }

      .stage {
        position: relative;
        border: 1px solid var(--card-border);
        border-radius: 20px;
        min-height: 520px;
        padding: 18px;
        background:
          linear-gradient(180deg, rgba(30, 88, 53, 0.35), rgba(7, 20, 14, 0.7)),
          repeating-linear-gradient(
            -35deg,
            rgba(255, 255, 255, 0.02),
            rgba(255, 255, 255, 0.02) 12px,
            rgba(0, 0, 0, 0.02) 12px,
            rgba(0, 0, 0, 0.02) 24px
          );
        background-position:
          0 0,
          0 0;
        background-size:
          100% 100%,
          170px 170px;
        box-shadow:
          0 24px 70px rgba(0, 0, 0, 0.38),
          inset 0 0 0 1px rgba(255, 255, 255, 0.03);
        overflow: hidden;
        animation: stripesDrift 34s linear infinite;
      }

      .ground {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        height: 82px;
        background:
          radial-gradient(140px 70px at 20% 120%, rgba(18, 63, 35, 0.8), transparent 70%),
          radial-gradient(170px 80px at 80% 120%, rgba(17, 54, 31, 0.8), transparent 70%),
          linear-gradient(180deg, rgba(33, 95, 56, 0.9), rgba(9, 37, 20, 1));
        border-top: 1px solid rgba(255, 255, 255, 0.08);
      }

      .stack-field {
        position: absolute;
        left: 5%;
        right: 5%;
        bottom: 79px;
        height: 360px;
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        pointer-events: none;
      }

      .stack-column {
        position: relative;
        flex: 1;
        min-width: 44px;
        max-width: 82px;
        height: 100%;
        margin: 0 3px;
      }

      .stack-base {
        position: absolute;
        left: 10%;
        width: 80%;
        bottom: -8px;
        height: 12px;
        border-radius: 999px;
        background: radial-gradient(circle at 50% 50%, rgba(7, 19, 13, 0.66), rgba(0, 0, 0, 0));
      }

      .bundle {
        position: absolute;
        left: var(--jitter);
        width: calc(100% - 2px);
        height: 14px;
        border-radius: 3px;
        border: 1px solid rgba(255, 255, 255, 0.18);
        background:
          linear-gradient(180deg, rgba(195, 254, 207, 0.9), rgba(67, 167, 98, 0.95));
        box-shadow:
          0 3px 5px rgba(0, 0, 0, 0.24),
          inset 0 0 0 1px rgba(255, 255, 255, 0.06);
        transform-origin: center bottom;
        transform: translateY(9px) scaleY(0.4);
        opacity: 0;
        animation: bundleRise 460ms cubic-bezier(0.23, 1, 0.32, 1) forwards;
        animation-delay: var(--delay);
      }

      .bundle::before {
        content: "";
        position: absolute;
        left: 0;
        right: 0;
        top: -4px;
        height: 4px;
        border-radius: 2px 2px 0 0;
        background: linear-gradient(180deg, rgba(229, 255, 236, 0.85), rgba(158, 232, 175, 0.82));
      }

      .bundle::after {
        content: "";
        position: absolute;
        left: 35%;
        top: 2px;
        width: 30%;
        height: 9px;
        border-radius: 2px;
        background: rgba(15, 91, 47, 0.36);
      }

      .glint {
        position: absolute;
        left: var(--x);
        bottom: var(--y);
        width: 3px;
        height: 12px;
        border-radius: 999px;
        background: linear-gradient(180deg, #fefde9, #ffe28a);
        opacity: 0;
        transform-origin: bottom center;
        animation: sparkle 540ms ease-out forwards;
        animation-delay: var(--delay);
      }

      .panel {
        border: 1px solid var(--card-border);
        border-radius: 18px;
        background: var(--card-bg);
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.22);
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        backdrop-filter: blur(4px);
      }

      .stat {
        font-weight: 700;
        font-size: clamp(1.1rem, 2.6vw, 1.45rem);
        letter-spacing: 0.02em;
      }

      .meta {
        color: var(--text-muted);
        font-size: 0.92rem;
      }

      .controls {
        display: grid;
        gap: 10px;
      }

      label {
        display: grid;
        gap: 6px;
        font-size: 0.92rem;
        color: var(--text-muted);
      }

      input[type="range"] {
        width: 100%;
        accent-color: var(--mint);
      }

      .buttons {
        display: flex;
        gap: 8px;
      }

      button {
        flex: 1;
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 10px;
        color: var(--text-main);
        font-weight: 600;
        padding: 10px 12px;
        cursor: pointer;
        transition: transform 160ms ease, filter 160ms ease;
      }

      .grow {
        background: linear-gradient(120deg, #1c9e5f, #44c57d);
      }

      .reset {
        background: linear-gradient(120deg, #5f3f1c, #936322);
      }

      button:hover {
        transform: translateY(-1px);
        filter: brightness(1.05);
      }

      .legend {
        color: var(--text-muted);
        font-size: 0.84rem;
        line-height: 1.4;
      }

      @keyframes bundleRise {
        0% {
          opacity: 0;
          transform: translateY(9px) scaleY(0.4);
        }
        66% {
          opacity: 1;
          transform: translateY(-1px) scaleY(1.08);
        }
        100% {
          opacity: 1;
          transform: scaleY(1);
        }
      }

      @keyframes sparkle {
        0% {
          opacity: 0;
          transform: translateY(0) rotate(var(--a)) scaleY(0.4);
        }
        20% {
          opacity: 1;
        }
        100% {
          opacity: 0;
          transform: translateY(-18px) rotate(var(--a)) scaleY(1.15);
        }
      }

      @keyframes stripesDrift {
        from {
          background-position:
            0 0,
            0 0;
        }
        to {
          background-position:
            0 0,
            -110px -110px;
        }
      }

      @media (max-width: 840px) {
        .layout {
          grid-template-columns: 1fr;
        }

        .stage {
          min-height: 460px;
        }

        .stack-field {
          left: 4%;
          right: 4%;
          height: 300px;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <header class="header">
        <h1>Growing Money Stacks</h1>
        <p class="subtitle">Side-view stacks that rise upward for calculator prototyping.</p>
      </header>

      <section class="layout">
        <div class="stage" aria-label="Animated money stacks rising upward">
          <div id="stackField" class="stack-field"></div>
          <div class="ground"></div>
        </div>

        <aside class="panel">
          <div class="stat" id="amountLabel">$0</div>
          <div class="meta" id="piecesLabel">0 bundles / 8 stacks</div>

          <div class="controls">
            <label>
              Growth speed
              <input id="speed" type="range" min="1" max="14" value="6" />
            </label>
            <label>
              Burst size
              <input id="burst" type="range" min="1" max="12" value="4" />
            </label>
          </div>

          <div class="buttons">
            <button id="grow" class="grow" type="button">Grow +</button>
            <button id="reset" class="reset" type="button">Reset</button>
          </div>

          <div class="legend">
            Press and hold Grow + to continuously add bundles. Each bundle in this prototype represents <strong>$10 billion</strong>, so full stacks naturally move into the trillion-dollar range.
          </div>
        </aside>
      </section>
    </main>

    <script>
      const stackField = document.getElementById("stackField");
      const amountLabel = document.getElementById("amountLabel");
      const piecesLabel = document.getElementById("piecesLabel");
      const growBtn = document.getElementById("grow");
      const resetBtn = document.getElementById("reset");
      const speedControl = document.getElementById("speed");
      const burstControl = document.getElementById("burst");

      let amount = 0;
      let bundles = 0;
      let growTimer = null;

      const STACK_COUNT = 8;
      const MAX_UNITS_PER_STACK = 25;
      const BUNDLE_VALUE = 10_000_000_000;
      const stacks = [];

      function formatMacroCurrency(value) {
        if (value >= 1_000_000_000_000) {
          return `$${(value / 1_000_000_000_000).toFixed(2)} trillion`;
        }
        return `$${(value / 1_000_000_000).toFixed(1)} billion`;
      }

      function updateLabels() {
        amountLabel.textContent = formatMacroCurrency(amount);
        piecesLabel.textContent = `${bundles} bundles / ${STACK_COUNT} stacks`;
      }

      function randomBetween(min, max) {
        return min + Math.random() * (max - min);
      }

      function buildStacks() {
        stackField.textContent = "";
        stacks.length = 0;

        for (let i = 0; i < STACK_COUNT; i += 1) {
          const column = document.createElement("div");
          column.className = "stack-column";

          const base = document.createElement("div");
          base.className = "stack-base";
          column.appendChild(base);

          stackField.appendChild(column);

          stacks.push({
            column,
            units: 0,
          });
        }
      }

      function pickStackIndex() {
        let bestIndex = 0;
        let bestScore = Number.POSITIVE_INFINITY;

        for (let i = 0; i < stacks.length; i += 1) {
          const candidate = stacks[i];
          if (candidate.units >= MAX_UNITS_PER_STACK) {
            continue;
          }

          const score = candidate.units + Math.random() * 0.95;
          if (score < bestScore) {
            bestScore = score;
            bestIndex = i;
          }
        }

        return bestIndex;
      }

      function addGlint(delay) {
        const glint = document.createElement("div");
        glint.className = "glint";

        glint.style.setProperty("--x", `${randomBetween(6, 96).toFixed(1)}%`);
        glint.style.setProperty("--y", `${randomBetween(20, 300).toFixed(1)}px`);
        glint.style.setProperty("--a", `${randomBetween(-36, 36).toFixed(1)}deg`);
        glint.style.setProperty("--delay", `${delay}ms`);

        stackField.appendChild(glint);

        window.setTimeout(() => {
          if (glint.parentNode) {
            glint.parentNode.removeChild(glint);
          }
        }, 640);
      }

      function addBundleToStack(stackIndex, delay) {
        const stack = stacks[stackIndex];
        if (!stack || stack.units >= MAX_UNITS_PER_STACK) {
          return;
        }

        const bundle = document.createElement("div");
        bundle.className = "bundle";

        const bottom = 2 + stack.units * 13;
        bundle.style.bottom = `${bottom}px`;
        bundle.style.setProperty("--jitter", `${randomBetween(-1.8, 1.8).toFixed(1)}px`);
        bundle.style.setProperty("--delay", `${delay}ms`);

        stack.column.appendChild(bundle);

        stack.units += 1;
        bundles += 1;
        amount += BUNDLE_VALUE;
      }

      function addBurst(multiplier = 1) {
        const burstSize = Number.parseInt(burstControl.value, 10) * multiplier;
        const speedFactor = Number.parseInt(speedControl.value, 10);
        const delayStep = Math.max(24, 170 - speedFactor * 10);

        for (let i = 0; i < burstSize; i += 1) {
          const delay = i * delayStep;
          addBundleToStack(pickStackIndex(), delay);

          if (Math.random() > 0.7) {
            addGlint(delay + randomBetween(50, 130));
          }
        }

        updateLabels();
      }

      function startGrowing() {
        if (growTimer !== null) {
          return;
        }

        addBurst(1);

        const interval = Math.max(160, 820 - Number.parseInt(speedControl.value, 10) * 45);
        growTimer = window.setInterval(() => {
          addBurst(1);
        }, interval);
      }

      function stopGrowing() {
        if (growTimer === null) {
          return;
        }
        window.clearInterval(growTimer);
        growTimer = null;
      }

      function resetPile() {
        stopGrowing();
        buildStacks();
        amount = 0;
        bundles = 0;
        updateLabels();
      }

      growBtn.addEventListener("pointerdown", startGrowing);
      growBtn.addEventListener("pointerup", stopGrowing);
      growBtn.addEventListener("pointerleave", stopGrowing);
      growBtn.addEventListener("click", () => addBurst(1));

      resetBtn.addEventListener("click", resetPile);

      speedControl.addEventListener("change", () => {
        if (growTimer !== null) {
          stopGrowing();
          startGrowing();
        }
      });

      buildStacks();
      updateLabels();
      addBurst(2);
    </script>
  </body>
</html>
