<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Star Pinata Hold Explosion Demo</title>
    <style>
      :root {
        --sky-1: #b7effc;
        --sky-2: #fef6d8;
        --sky-3: #ffdcb8;
        --shadow: rgba(74, 42, 18, 0.24);
        --paper-a: #ff7a6e;
        --paper-b: #ffbc3a;
        --paper-c: #69d2ff;
        --paper-d: #7de57e;
        --paper-e: #f28fff;
        --text: #503121;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        font-family: "Baloo 2", "Trebuchet MS", "Comic Sans MS", cursive;
        color: #503121;
        color: var(--text);
        background: linear-gradient(180deg, #b7effc, #fef6d8 58%, #ffdcb8);
        background:
          radial-gradient(60rem 22rem at 20% -10%, rgba(255, 255, 255, 0.7), transparent 65%),
          radial-gradient(45rem 20rem at 110% 20%, rgba(255, 255, 255, 0.55), transparent 70%),
          linear-gradient(180deg, var(--sky-1), var(--sky-2) 58%, var(--sky-3));
        overflow: hidden;
      }

      .scene {
        position: relative;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        display: grid;
        place-items: center;
        padding: 2rem;
      }

      .hint {
        position: absolute;
        top: 1rem;
        text-align: center;
        font-size: clamp(1rem, 2.6vw, 1.2rem);
        font-weight: 700;
        letter-spacing: 0.02em;
        text-wrap: balance;
      }

      .stage {
        position: relative;
        width: min(24rem, 92vw);
        height: min(35rem, 82vh);
        box-shadow: 0 1.2rem 1.2rem rgba(74, 42, 18, 0.24);
        filter: drop-shadow(0 1.2rem 1.2rem var(--shadow));
      }

      .fall {
        position: absolute;
        left: 50%;
        top: 0;
        transform: translateX(-50%) translateY(-18rem);
        animation: pinataDrop 1.2s cubic-bezier(0.22, 0.92, 0.25, 1.05) forwards;
      }

      .swing {
        position: relative;
        transform-origin: top center;
        animation: gentleSwing 4.6s ease-in-out 1.2s infinite;
      }

      .rope {
        width: 0.3rem;
        height: 12.5rem;
        margin: 0 auto;
        border-radius: 999px;
        background: repeating-linear-gradient(
          180deg,
          #f6efe4,
          #f6efe4 0.45rem,
          #dcc9ad 0.45rem,
          #dcc9ad 0.9rem
        );
      }

      .pinata {
        position: relative;
        width: 13rem;
        margin: -0.1rem auto 0;
        border: 0;
        background: none;
        cursor: pointer;
        -ms-touch-action: none;
        touch-action: none;
        padding: 0.5rem;
        border-radius: 50%;
        -webkit-tap-highlight-color: transparent;
        transition: transform 100ms ease;
      }

      .pinata:active {
        transform: scale(0.98);
      }

      .star-wrap {
        position: relative;
        width: 100%;
        height: 13.2rem;
        display: flex;
        align-items: center;
        justify-content: center;
        display: grid;
        place-items: center;
      }

      .star {
        position: relative;
        width: 11.2rem;
        height: 11.2rem;
        aspect-ratio: 1;
        -webkit-clip-path: polygon(
          50% 0%,
          61% 34%,
          98% 35%,
          68% 56%,
          79% 92%,
          50% 71%,
          21% 92%,
          32% 56%,
          2% 35%,
          39% 34%
        );
        clip-path: polygon(
          50% 0%,
          61% 34%,
          98% 35%,
          68% 56%,
          79% 92%,
          50% 71%,
          21% 92%,
          32% 56%,
          2% 35%,
          39% 34%
        );
        border-radius: 1.3rem;
        border: 0.24rem solid rgba(112, 58, 28, 0.16);
        background:
          linear-gradient(145deg, rgba(255, 255, 255, 0.48), rgba(255, 255, 255, 0) 45%),
          repeating-linear-gradient(
            180deg,
            #ff7a6e 0 1rem,
            #ffbc3a 1rem 2rem,
            #69d2ff 2rem 3rem,
            #7de57e 3rem 4rem,
            #f28fff 4rem 5rem,
            #ff7a6e 5rem 6rem,
            #69d2ff 6rem 7rem
          );
        background:
          linear-gradient(145deg, rgba(255, 255, 255, 0.48), rgba(255, 255, 255, 0) 45%),
          repeating-linear-gradient(
            180deg,
            var(--paper-a) 0 1rem,
            var(--paper-b) 1rem 2rem,
            var(--paper-c) 2rem 3rem,
            var(--paper-d) 3rem 4rem,
            var(--paper-e) 4rem 5rem,
            var(--paper-a) 5rem 6rem,
            var(--paper-c) 6rem 7rem
          );
      }

      .eye {
        position: absolute;
        top: 4.4rem;
        width: 0.8rem;
        height: 1rem;
        border-radius: 50%;
        background: #2e251f;
      }

      .eye.left {
        left: 4.15rem;
      }

      .eye.right {
        right: 4.15rem;
      }

      .cheek {
        position: absolute;
        top: 5.35rem;
        width: 1rem;
        height: 0.62rem;
        border-radius: 50%;
        background: rgba(255, 150, 165, 0.72);
      }

      .cheek.left {
        left: 3.15rem;
      }

      .cheek.right {
        right: 3.15rem;
      }

      .smile {
        position: absolute;
        left: 50%;
        top: 5.8rem;
        width: 1.5rem;
        height: 0.75rem;
        transform: translateX(-50%);
        border-bottom: 0.17rem solid #5a3020;
        border-radius: 0 0 1rem 1rem;
      }

      .fringe {
        position: absolute;
        bottom: 0.8rem;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        justify-content: space-between;
        display: grid;
        grid-template-columns: repeat(9, 1fr);
        gap: 0.08rem;
        width: 5.8rem;
      }

      .fringe span {
        height: 1rem;
        border-radius: 0 0 0.5rem 0.5rem;
      }

      .fringe span:nth-child(5n + 1) { background: var(--paper-a); }
      .fringe span:nth-child(5n + 2) { background: var(--paper-b); }
      .fringe span:nth-child(5n + 3) { background: var(--paper-c); }
      .fringe span:nth-child(5n + 4) { background: var(--paper-d); }
      .fringe span:nth-child(5n + 5) { background: var(--paper-e); }

      .fringe span:nth-child(5n + 1) { background: #ff7a6e; }
      .fringe span:nth-child(5n + 2) { background: #ffbc3a; }
      .fringe span:nth-child(5n + 3) { background: #69d2ff; }
      .fringe span:nth-child(5n + 4) { background: #7de57e; }
      .fringe span:nth-child(5n + 5) { background: #f28fff; }

      .pinata:active .star-wrap {
        transform: scale(0.985);
      }

      .pinata.bursting .star-wrap {
        animation: wobble 0.16s linear infinite;
      }

      .explosion {
        position: absolute;
        left: 50%;
        top: 50%;
        width: 11.6rem;
        height: 11.6rem;
        aspect-ratio: 1;
        transform: translate(-50%, -50%);
        display: none;
        z-index: 10;
      }

      .explosion-shape {
        position: absolute;
        inset: 0;
        -webkit-clip-path: polygon(
          50% 0%, 60% 19%, 82% 6%, 77% 29%, 100% 24%, 83% 42%,
          99% 56%, 75% 61%, 86% 84%, 63% 76%, 61% 100%, 47% 79%,
          30% 98%, 30% 75%, 8% 84%, 18% 62%, 0% 54%, 19% 43%,
          4% 24%, 25% 28%, 18% 6%, 40% 19%
        );
        clip-path: polygon(
          50% 0%, 60% 19%, 82% 6%, 77% 29%, 100% 24%, 83% 42%,
          99% 56%, 75% 61%, 86% 84%, 63% 76%, 61% 100%, 47% 79%,
          30% 98%, 30% 75%, 8% 84%, 18% 62%, 0% 54%, 19% 43%,
          4% 24%, 25% 28%, 18% 6%, 40% 19%
        );
        border-radius: 50%;
        background:
          radial-gradient(circle at 50% 48%, #fff7ca 0 28%, #ffd35d 30% 52%, #ff873f 54% 75%, #f24929 76% 100%);
      }

      .explosion-text {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%) rotate(-6deg);
        font-size: 1.8rem;
        font-weight: 800;
        color: #5a2309;
        letter-spacing: 0.05em;
        text-shadow: 0.08rem 0.08rem 0 #fff2c7;
      }

      .pinata.bursting .explosion {
        display: block;
      }

      @keyframes pinataDrop {
        0% {
          transform: translateX(-50%) translateY(-18rem);
        }
        76% {
          transform: translateX(-50%) translateY(0.7rem);
        }
        100% {
          transform: translateX(-50%) translateY(0);
        }
      }

      @keyframes gentleSwing {
        0%,
        100% {
          transform: rotate(6deg);
        }
        50% {
          transform: rotate(-6deg);
        }
      }

      @keyframes wobble {
        0% { transform: rotate(0deg); }
        25% { transform: rotate(2deg); }
        50% { transform: rotate(0deg); }
        75% { transform: rotate(-2deg); }
        100% { transform: rotate(0deg); }
      }

      @media (prefers-reduced-motion: reduce) {
        .fall,
        .swing,
        .pinata.bursting .star-wrap {
          animation: none;
        }
      }

      @media (max-width: 840px) {
        .hint {
          font-size: clamp(0.95rem, 2.2vw, 1.1rem);
          top: 0.5rem;
        }

        .stage {
          width: min(22rem, 90vw);
          height: min(32rem, 75vh);
        }
      }

      @media (max-width: 600px) {
        .hint {
          font-size: clamp(0.9rem, 2vw, 1rem);
          padding: 0 1rem;
        }

        .stage {
          width: min(20rem, 88vw);
          height: min(30rem, 70vh);
          padding: 1rem;
        }

        .rope {
          height: 11rem;
        }

        .pinata {
          width: 12rem;
        }

        .explosion {
          width: 10.8rem;
        }

        .fall {
          transform: translateX(-50%) translateY(-16rem);
        }

        .swing {
          animation: gentleSwing 5.2s ease-in-out 1s infinite;
        }
      }

      @media (max-width: 480px) {
        .hint {
          font-size: 0.9rem;
        }

        .rope {
          height: 10.6rem;
        }

        .pinata {
          width: 11.8rem;
        }

        .explosion {
          width: 10.4rem;
        }

        .stage {
          width: min(18rem, 85vw);
          height: min(28rem, 65vh);
          padding: 0.75rem;
        }

        .fall {
          transform: translateX(-50%) translateY(-14rem);
        }
      }

      @media (max-width: 380px) {
        .pinata {
          width: 10.6rem;
        }

        .rope {
          height: 9.5rem;
        }

        .explosion {
          width: 9.2rem;
        }

        .hint {
          font-size: 0.85rem;
          font-weight: 600;
        }

        .stage {
          width: min(16rem, 82vw);
          height: min(24rem, 60vh);
        }
      }
    </style>
  </head>
  <body>
    <main class="scene">
      <p class="hint">Tap and hold the star pinata to show the explosion.</p>

      <section class="stage" aria-label="Pinata animation demo">
        <div class="fall">
          <div class="swing">
            <div class="rope" aria-hidden="true"></div>

            <button class="pinata" id="pinata" aria-label="Hold to explode pinata">
              <div class="star-wrap">
                <div class="star" aria-hidden="true">
                  <span class="eye left"></span>
                  <span class="eye right"></span>
                  <span class="cheek left"></span>
                  <span class="cheek right"></span>
                  <span class="smile"></span>
                </div>
                <div class="fringe" aria-hidden="true">
                  <span></span><span></span><span></span><span></span><span></span>
                  <span></span><span></span><span></span><span></span>
                </div>
              </div>
              <div class="explosion" id="explosion" aria-hidden="true">
                <div class="explosion-shape"></div>
                <div class="explosion-text">BOOM</div>
              </div>
            </button>
          </div>
        </div>
      </section>
    </main>

    <script>
      var pinata = document.getElementById("pinata");
      var holding = false;
      var supportsPointerEvents = !!window.PointerEvent;

      function startBursting(pointerId) {
        if (holding) {
          return;
        }

        holding = true;
        pinata.classList.add("bursting");

        if (
          typeof pointerId === "number" &&
          typeof pinata.setPointerCapture === "function"
        ) {
          pinata.setPointerCapture(pointerId);
        }
      }

      function stopBursting(pointerId) {
        if (!holding) {
          return;
        }

        holding = false;
        pinata.classList.remove("bursting");

        if (
          typeof pointerId === "number" &&
          typeof pinata.hasPointerCapture === "function" &&
          pinata.hasPointerCapture(pointerId) &&
          typeof pinata.releasePointerCapture === "function"
        ) {
          pinata.releasePointerCapture(pointerId);
        }
      }

      function handlePointerDown(event) {
        if (typeof event.button === "number" && event.button !== 0) {
          return;
        }

        event.preventDefault();
        startBursting(event.pointerId);
      }

      function handleKeyDown(event) {
        var key = event.key || event.code;
        var keyCode = event.keyCode;

        if (key === " " || key === "Spacebar" || key === "Space" || key === "Enter" || keyCode === 32 || keyCode === 13) {
          event.preventDefault();
          startBursting();
        }
      }

      function handleKeyUp(event) {
        var key = event.key || event.code;
        var keyCode = event.keyCode;

        if (key === " " || key === "Spacebar" || key === "Space" || key === "Enter" || keyCode === 32 || keyCode === 13) {
          event.preventDefault();
          stopBursting();
        }
      }

      if (supportsPointerEvents) {
        pinata.addEventListener("pointerdown", handlePointerDown);
        pinata.addEventListener("pointerup", function (event) {
          stopBursting(event.pointerId);
        });
        pinata.addEventListener("pointercancel", function (event) {
          stopBursting(event.pointerId);
        });
        pinata.addEventListener("lostpointercapture", function (event) {
          stopBursting(event.pointerId);
        });
        document.addEventListener("pointerup", function (event) {
          stopBursting(event.pointerId);
        });
      } else {
        pinata.addEventListener("mousedown", function (event) {
          if (event.button !== 0) {
            return;
          }

          event.preventDefault();
          startBursting();
        });
        document.addEventListener("mouseup", function () {
          stopBursting();
        });
        pinata.addEventListener("touchstart", function (event) {
          event.preventDefault();
          startBursting();
        });
        document.addEventListener("touchend", function () {
          stopBursting();
        });
        document.addEventListener("touchcancel", function () {
          stopBursting();
        });
      }

      pinata.addEventListener("keydown", handleKeyDown);
      pinata.addEventListener("keyup", handleKeyUp);
    </script>
  </body>
</html>
