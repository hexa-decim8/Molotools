name: Minify Plugin Assets

on:
  push:
    branches:
      - main
    paths:
      - scripts/minify-assets.mjs
      - calculators/abdulify-me/wordpress/abdulify-me/js/abdulify-me.js
      - calculators/abdulify-me/wordpress/abdulify-me/css/abdulify-me.css
      - calculators/wealth-tax-calculator/wordpress/wealth-tax-calculator/js/calculator.js
      - calculators/wealth-tax-calculator/wordpress/wealth-tax-calculator/css/styles.css
  workflow_dispatch:

permissions:
  contents: write

jobs:
  minify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Regenerate minified assets
        run: npm run minify

      - name: Commit minified assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add \
            calculators/abdulify-me/wordpress/abdulify-me/js/abdulify-me.min.js \
            calculators/abdulify-me/wordpress/abdulify-me/css/abdulify-me.min.css \
            calculators/wealth-tax-calculator/wordpress/wealth-tax-calculator/js/calculator.min.js \
            calculators/wealth-tax-calculator/wordpress/wealth-tax-calculator/css/styles.min.css

          if git diff --cached --quiet; then
            echo "No minified asset changes to commit"
            exit 0
          fi

          git commit -m "build: regenerate minified plugin assets"
          git push origin "HEAD:${GITHUB_REF_NAME}"
