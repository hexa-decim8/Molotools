name: Build And Commit Abdulify Me Plugin Zip

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/build-abdulify-me-plugin.yml
      - .github/workflows/browser-validation.yml
      - scripts/**
      - package.json
      - package-lock.json
      - calculators/abdulify-me/wordpress/abdulify-me/**
  workflow_dispatch:
    inputs:
      version:
        description: 'Optional version override in X.Y.Z format (example: 0.1.1)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-tag-and-release:
    runs-on: ubuntu-latest

    env:
      PLUGIN_DIR: calculators/abdulify-me/wordpress
      PLUGIN_SRC_DIR: calculators/abdulify-me/wordpress/abdulify-me
      PHP_FILE: calculators/abdulify-me/wordpress/abdulify-me/abdulify-me.php
      CHANGELOG_FILE: calculators/abdulify-me/wordpress/abdulify-me/CHANGELOG.md
      ZIP_FILE: calculators/abdulify-me/wordpress/abdulify-me.zip

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install repository tooling
        run: npm ci

      - name: Resolve release version and tag
        id: version
        run: |
          VERSION="${{ inputs.version }}"

          if [ -z "$VERSION" ]; then
            VERSION=$(grep '^ \* Version:' "${{ env.PHP_FILE }}" | sed 's/^ \* Version:[[:space:]]*//')
          fi

          if ! printf '%s' "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Invalid version: $VERSION"
            echo "Expected X.Y.Z semver format"
            exit 1
          fi

          git fetch --tags --force

          RESOLVED_VERSION="$VERSION"
          HEAD_COMMIT=$(git rev-parse HEAD)

          while true; do
            TAG="am-v$RESOLVED_VERSION"

            if ! git rev-parse "$TAG" >/dev/null 2>&1; then
              break
            fi

            TAG_COMMIT=$(git rev-list -n 1 "$TAG")
            if [ "$TAG_COMMIT" = "$HEAD_COMMIT" ]; then
              break
            fi

            IFS='.' read -r MAJOR MINOR PATCH <<< "$RESOLVED_VERSION"
            PATCH=$((PATCH + 1))
            RESOLVED_VERSION="$MAJOR.$MINOR.$PATCH"
          done

          if [ "$RESOLVED_VERSION" != "$VERSION" ]; then
            echo "Tag am-v$VERSION exists on a different commit. Auto-incrementing to am-v$RESOLVED_VERSION."

            sed -E -i "s/^ \* Version:[[:space:]]*.*/ * Version:     $RESOLVED_VERSION/" "${{ env.PHP_FILE }}"
            sed -E -i "s/(define\( 'ABDULIFY_ME_VERSION', ')[^']+(' \);)/\\1$RESOLVED_VERSION\\2/" "${{ env.PHP_FILE }}"

            if ! grep -q "^## \[$RESOLVED_VERSION\]" "${{ env.CHANGELOG_FILE }}"; then
              TODAY=$(date +%Y-%m-%d)
              TMP_FILE=$(mktemp)

              awk -v version="$RESOLVED_VERSION" -v today="$TODAY" '
                { print }
                $0 == "## [Unreleased]" {
                  print ""
                  print "## [" version "] - " today
                  print ""
                }
              ' "${{ env.CHANGELOG_FILE }}" > "$TMP_FILE"

              mv "$TMP_FILE" "${{ env.CHANGELOG_FILE }}"
            fi
          fi

          echo "version=$RESOLVED_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=am-v$RESOLVED_VERSION" >> "$GITHUB_OUTPUT"

      - name: Validate version consistency
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          HEADER_VERSION=$(grep '^ \* Version:' "${{ env.PHP_FILE }}" | sed 's/^ \* Version:[[:space:]]*//')
          CONSTANT_VERSION=$(grep "define( 'ABDULIFY_ME_VERSION'" "${{ env.PHP_FILE }}" | sed -E "s/.*'ABDULIFY_ME_VERSION',[[:space:]]*'([^']+)'.*/\1/")

          if [ "$HEADER_VERSION" != "$VERSION" ]; then
            echo "Plugin header version $HEADER_VERSION does not match target version $VERSION"
            exit 1
          fi

          if [ "$CONSTANT_VERSION" != "$VERSION" ]; then
            echo "ABDULIFY_ME_VERSION $CONSTANT_VERSION does not match target version $VERSION"
            exit 1
          fi

      - name: Validate changelog entry
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          if ! grep -q "^## \[$VERSION\]" "${{ env.CHANGELOG_FILE }}"; then
            echo "CHANGELOG.md is missing a section for version $VERSION"
            exit 1
          fi

      - name: Regenerate minified plugin assets
        run: npm run minify

      - name: Build plugin zip
        run: |
          cd "${{ env.PLUGIN_DIR }}"
          rm -f abdulify-me.zip
          zip -X -r abdulify-me.zip abdulify-me \
            -x "*/.DS_Store" "*/Thumbs.db" "*/.git/*" "*/node_modules/*" "*/src/*" "*.log" "*.map"

      - name: Verify zip integrity
        run: |
          if [ ! -f "${{ env.ZIP_FILE }}" ]; then
            echo "Release zip was not created"
            exit 1
          fi

          unzip -t "${{ env.ZIP_FILE }}" > /dev/null

          if ! unzip -Z1 "${{ env.ZIP_FILE }}" | grep -q '^abdulify-me/abdulify-me.php$'; then
            echo "Release zip does not contain abdulify-me/abdulify-me.php"
            exit 1
          fi

      - name: Commit refreshed plugin artifacts
        id: commit_zip
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add "${{ env.ZIP_FILE }}" "${{ env.PHP_FILE }}" "${{ env.CHANGELOG_FILE }}" \
            "${{ env.PLUGIN_SRC_DIR }}/js/abdulify-me.min.js" \
            "${{ env.PLUGIN_SRC_DIR }}/css/abdulify-me.min.css"

          if git diff --cached --quiet; then
            echo "No plugin artifact changes to commit"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git commit -m "build(abdulify-me): refresh plugin artifacts for am-v$VERSION"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Create semantic release tag
        id: tag
        run: |
          TAG="${{ steps.version.outputs.tag }}"

          git fetch --tags --force

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            TAG_COMMIT=$(git rev-list -n 1 "$TAG")
            HEAD_COMMIT=$(git rev-parse HEAD)

            if [ "$TAG_COMMIT" != "$HEAD_COMMIT" ]; then
              echo "Tag $TAG already exists on a different commit ($TAG_COMMIT)."
              echo "Bump plugin version to create a new release tag."
              exit 1
            fi

            echo "Tag $TAG already exists on HEAD."
            echo "created=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"
          echo "created=true" >> "$GITHUB_OUTPUT"

      - name: Extract release notes from changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          NOTES_FILE="$RUNNER_TEMP/release-notes.md"

          awk -v version="$VERSION" '
            $0 ~ "^## \\[" version "\\]" { capture=1; print; next }
            capture && /^## \[/ { exit }
            capture { print }
          ' "${{ env.CHANGELOG_FILE }}" > "$NOTES_FILE"

          if [ ! -s "$NOTES_FILE" ]; then
            echo "Could not extract release notes for $VERSION from changelog"
            exit 1
          fi

          echo "RELEASE_NOTES_FILE=$NOTES_FILE" >> "$GITHUB_ENV"

      - name: Create or update GitHub release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          VERSION="${{ steps.version.outputs.version }}"

          if gh release view "$TAG" > /dev/null 2>&1; then
            gh release upload "$TAG" "${{ env.ZIP_FILE }}" --clobber
            gh release edit "$TAG" \
              --title "Abdulify Me am-v$VERSION" \
              --notes-file "$RELEASE_NOTES_FILE"
          else
            gh release create "$TAG" "${{ env.ZIP_FILE }}" \
              --title "Abdulify Me am-v$VERSION" \
              --notes-file "$RELEASE_NOTES_FILE"
          fi

      - name: Verify published release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"

          if ! gh release view "$TAG" --json assets | jq -e '.assets[] | select(.name == "abdulify-me.zip")' > /dev/null; then
            echo "Release asset abdulify-me.zip not found for tag $TAG"
            exit 1
          fi
