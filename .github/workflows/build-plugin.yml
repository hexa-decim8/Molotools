name: Build And Commit WordPress Plugin Zip

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/build-plugin.yml
      - calculators/wealth-tax-calculator/wordpress/wealth-tax-calculator/**
  workflow_dispatch:
    inputs:
      version:
        description: 'Optional version override in X.Y.Z format (example: 1.2.1)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-tag-and-release:
    runs-on: ubuntu-latest

    env:
      PLUGIN_DIR: calculators/wealth-tax-calculator/wordpress
      PLUGIN_SRC_DIR: calculators/wealth-tax-calculator/wordpress/wealth-tax-calculator
      PHP_FILE: calculators/wealth-tax-calculator/wordpress/wealth-tax-calculator/wealth-tax-calculator.php
      CHANGELOG_FILE: calculators/wealth-tax-calculator/wordpress/wealth-tax-calculator/CHANGELOG.md
      ZIP_FILE: calculators/wealth-tax-calculator/wordpress/wealth-tax-calculator.zip

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release version and tag
        id: version
        run: |
          VERSION="${{ inputs.version }}"

          if [ -z "$VERSION" ]; then
            VERSION=$(grep '^ \* Version:' "${{ env.PHP_FILE }}" | sed 's/^ \* Version:[[:space:]]*//')
          fi

          if ! printf '%s' "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Invalid version: $VERSION"
            echo "Expected X.Y.Z semver format"
            exit 1
          fi

          TAG="v$VERSION"

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Validate version consistency
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          HEADER_VERSION=$(grep '^ \* Version:' "${{ env.PHP_FILE }}" | sed 's/^ \* Version:[[:space:]]*//')
          CONSTANT_VERSION=$(grep "define( 'WTC_VERSION'" "${{ env.PHP_FILE }}" | sed -E "s/.*'WTC_VERSION',[[:space:]]*'([^']+)'.*/\1/")

          if [ "$HEADER_VERSION" != "$VERSION" ]; then
            echo "Plugin header version $HEADER_VERSION does not match target version $VERSION"
            exit 1
          fi

          if [ "$CONSTANT_VERSION" != "$VERSION" ]; then
            echo "WTC_VERSION $CONSTANT_VERSION does not match target version $VERSION"
            exit 1
          fi

      - name: Validate changelog entry
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          if ! grep -q "^## \[$VERSION\]" "${{ env.CHANGELOG_FILE }}"; then
            echo "CHANGELOG.md is missing a section for version $VERSION"
            exit 1
          fi

      - name: Build plugin zip
        run: |
          cd "${{ env.PLUGIN_DIR }}"
          rm -f wealth-tax-calculator.zip
          zip -X -r wealth-tax-calculator.zip wealth-tax-calculator \
            -x "*/.DS_Store" "*/Thumbs.db" "*/.git/*" "*/node_modules/*" "*/src/*" "*.log" "*.map"

      - name: Verify zip integrity
        run: |
          if [ ! -f "${{ env.ZIP_FILE }}" ]; then
            echo "Release zip was not created"
            exit 1
          fi

          unzip -t "${{ env.ZIP_FILE }}" > /dev/null

          if ! unzip -Z1 "${{ env.ZIP_FILE }}" | grep -q '^wealth-tax-calculator/wealth-tax-calculator.php$'; then
            echo "Release zip does not contain wealth-tax-calculator/wealth-tax-calculator.php"
            exit 1
          fi

      - name: Commit refreshed plugin zip
        id: commit_zip
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add "${{ env.ZIP_FILE }}"

          if git diff --cached --quiet; then
            echo "No zip changes to commit"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git commit -m "build(plugin): refresh wealth-tax-calculator.zip for v$VERSION"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Create semantic release tag
        id: tag
        run: |
          TAG="${{ steps.version.outputs.tag }}"

          git fetch --tags --force

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            TAG_COMMIT=$(git rev-list -n 1 "$TAG")
            HEAD_COMMIT=$(git rev-parse HEAD)

            if [ "$TAG_COMMIT" != "$HEAD_COMMIT" ]; then
              echo "Tag $TAG already exists on a different commit ($TAG_COMMIT)."
              echo "Bump plugin version to create a new release tag."
              exit 1
            fi

            echo "Tag $TAG already exists on HEAD."
            echo "created=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"
          echo "created=true" >> "$GITHUB_OUTPUT"

      - name: Extract release notes from changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          NOTES_FILE="$RUNNER_TEMP/release-notes.md"

          awk -v version="$VERSION" '
            $0 ~ "^## \\[" version "\\]" { capture=1; print; next }
            capture && /^## \[/ { exit }
            capture { print }
          ' "${{ env.CHANGELOG_FILE }}" > "$NOTES_FILE"

          if [ ! -s "$NOTES_FILE" ]; then
            echo "Could not extract release notes for $VERSION from changelog"
            exit 1
          fi

          echo "RELEASE_NOTES_FILE=$NOTES_FILE" >> "$GITHUB_ENV"

      - name: Create or update GitHub release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          VERSION="${{ steps.version.outputs.version }}"

          if gh release view "$TAG" > /dev/null 2>&1; then
            gh release upload "$TAG" "${{ env.ZIP_FILE }}" --clobber
            gh release edit "$TAG" \
              --title "Wealth Tax Calculator v$VERSION" \
              --notes-file "$RELEASE_NOTES_FILE"
          else
            gh release create "$TAG" "${{ env.ZIP_FILE }}" \
              --title "Wealth Tax Calculator v$VERSION" \
              --notes-file "$RELEASE_NOTES_FILE"
          fi

      - name: Verify published release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"

          if ! gh release view "$TAG" --json assets --jq '.assets[].name' | grep -Fxq 'wealth-tax-calculator.zip'; then
            echo "GitHub release is missing wealth-tax-calculator.zip"
            exit 1
          fi
