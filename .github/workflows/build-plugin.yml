name: Build WordPress Plugin Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: Version tag to build and publish, for example v1.2.0
        required: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    env:
      PLUGIN_DIR: calculators/wealth-tax-calculator/wordpress
      PHP_FILE: calculators/wealth-tax-calculator/wordpress/wealth-tax-calculator/wealth-tax-calculator.php
      CHANGELOG_FILE: calculators/wealth-tax-calculator/wordpress/wealth-tax-calculator/CHANGELOG.md
      ZIP_FILE: calculators/wealth-tax-calculator/wordpress/wealth-tax-calculator.zip

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create CI build tag for commit
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          CI_TAG="ci-build-${SHORT_SHA}"

          git fetch --tags --force

          if git rev-parse "$CI_TAG" >/dev/null 2>&1; then
            echo "CI tag $CI_TAG already exists; continuing."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git tag "$CI_TAG"
          git push origin "$CI_TAG"

      - name: Resolve release version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
            if [ -z "$TAG" ]; then
              TAG=$(git tag --points-at "$GITHUB_SHA" | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n 1 || true)
            fi

            if [ -z "$TAG" ]; then
              VERSION=$(grep '^ \* Version:' "${{ env.PHP_FILE }}" | sed 's/^ \* Version:[[:space:]]*//')
              TAG="v${VERSION}"
            fi
          elif [ "${GITHUB_REF#refs/tags/}" != "$GITHUB_REF" ]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            VERSION=$(grep '^ \* Version:' "${{ env.PHP_FILE }}" | sed 's/^ \* Version:[[:space:]]*//')
            TAG="v${VERSION}"
          fi

          if ! printf '%s' "$TAG" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Invalid release tag: $TAG"
            exit 1
          fi

          VERSION="${TAG#v}"

          SHOULD_RELEASE="true"

          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref }}" = "refs/heads/main" ]; then
            git fetch --tags --force

            if git rev-parse "$TAG" >/dev/null 2>&1; then
              TAG_COMMIT=$(git rev-list -n 1 "$TAG")

              if [ "$TAG_COMMIT" != "$GITHUB_SHA" ]; then
                echo "Tag $TAG already exists on commit $TAG_COMMIT."
                echo "Skipping release creation for this commit and running build-only mode."
                SHOULD_RELEASE="false"
              fi
            else
              git config user.name "github-actions[bot]"
              git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

              git tag -a "$TAG" -m "Release $TAG"
              git push origin "$TAG"
            fi
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "should_release=$SHOULD_RELEASE" >> "$GITHUB_OUTPUT"

      - name: Validate version consistency
        if: steps.version.outputs.should_release == 'true'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          HEADER_VERSION=$(grep '^ \* Version:' "${{ env.PHP_FILE }}" | sed 's/^ \* Version:[[:space:]]*//')
          CONSTANT_VERSION=$(grep "define( 'WTC_VERSION'" "${{ env.PHP_FILE }}" | sed -E "s/.*'WTC_VERSION',[[:space:]]*'([^']+)'.*/\1/")

          if [ "$HEADER_VERSION" != "$VERSION" ]; then
            echo "Plugin header version $HEADER_VERSION does not match tag $VERSION"
            exit 1
          fi

          if [ "$CONSTANT_VERSION" != "$VERSION" ]; then
            echo "WTC_VERSION $CONSTANT_VERSION does not match tag $VERSION"
            exit 1
          fi

      - name: Validate changelog entry
        if: steps.version.outputs.should_release == 'true'
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          if ! grep -q "^## \[$VERSION\]" "${{ env.CHANGELOG_FILE }}"; then
            echo "CHANGELOG.md is missing a section for version $VERSION"
            exit 1
          fi

      - name: Build plugin zip
        run: |
          cd "${{ env.PLUGIN_DIR }}"
          rm -f wealth-tax-calculator.zip
          zip -r wealth-tax-calculator.zip wealth-tax-calculator \
            -x "*/.DS_Store" "*/Thumbs.db" "*/.git/*" "*/node_modules/*" "*/src/*" "*.log" "*.map"

      - name: Verify release artifact
        run: |
          if [ ! -f "${{ env.ZIP_FILE }}" ]; then
            echo "Release zip was not created"
            exit 1
          fi

          unzip -t "${{ env.ZIP_FILE }}" > /dev/null

          if ! unzip -Z1 "${{ env.ZIP_FILE }}" | grep -q '^wealth-tax-calculator/wealth-tax-calculator.php$'; then
            echo "Release zip does not contain the expected plugin root"
            exit 1
          fi

      - name: Upload zip as CI artifact
        uses: actions/upload-artifact@v4
        with:
          name: wealth-tax-calculator-${{ github.sha }}
          path: ${{ env.ZIP_FILE }}
          if-no-files-found: error

      - name: Extract release notes
        if: steps.version.outputs.should_release == 'true'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          NOTES_FILE="$RUNNER_TEMP/release-notes.md"

          awk -v version="$VERSION" '
            $0 ~ "^## \\[" version "\\]" { capture=1; print; next }
            capture && /^## \[/ { exit }
            capture { print }
          ' "${{ env.CHANGELOG_FILE }}" > "$NOTES_FILE"

          if [ ! -s "$NOTES_FILE" ]; then
            echo "Failed to extract release notes for version $VERSION"
            exit 1
          fi

          echo "RELEASE_NOTES_FILE=$NOTES_FILE" >> "$GITHUB_ENV"

      - name: Create or update GitHub release
        if: steps.version.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          VERSION="${{ steps.version.outputs.version }}"

          if gh release view "$TAG" > /dev/null 2>&1; then
            gh release upload "$TAG" "${{ env.ZIP_FILE }}" --clobber
            gh release edit "$TAG" \
              --title "Wealth Tax Calculator v$VERSION" \
              --notes-file "$RELEASE_NOTES_FILE"
          else
            gh release create "$TAG" "${{ env.ZIP_FILE }}" \
              --title "Wealth Tax Calculator v$VERSION" \
              --notes-file "$RELEASE_NOTES_FILE"
          fi

      - name: Verify published asset
        if: steps.version.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"

          if ! gh release view "$TAG" --json assets --jq '.assets[].name' | grep -Fxq 'wealth-tax-calculator.zip'; then
            echo "GitHub release is missing wealth-tax-calculator.zip"
            exit 1
          fi
